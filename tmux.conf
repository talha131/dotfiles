# Pass Shift+Enter through to apps like Claude Code as a CSI u encoded
# escape sequence, so it registers as "newline without submit" instead
# of regular Enter. The -n flag means no tmux prefix key is needed.
bind-key -n S-Enter send-keys Escape "[13;2u"

# Disable tmux's extended key encoding for all keys. When set to "on",
# tmux re-encodes every keypress (including Ctrl+D, Ctrl+L) in CSI u
# format which Fish shell doesn't understand. Turning it off lets
# normal control characters pass through unchanged, while the explicit
# Shift+Enter binding above still works.
set -s extended-keys off

# Tell tmux that the terminal supports extended key features.
# This is needed so the Shift+Enter binding above can work correctly.
# The -as flag appends to existing features rather than replacing them.
set -as terminal-features 'tmux-256color:extkeys'

# Remove the delay tmux adds after receiving an Escape character.
# By default tmux waits ~500ms to see if more keys follow (since Alt
# key combos are sent as Escape + key). This delay causes screen
# flashing when using Alt+arrow keys in Fish shell to jump between
# words. Setting it to 0 eliminates that flicker.
set -s escape-time 0
